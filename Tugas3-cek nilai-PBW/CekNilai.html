<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Cek Nilai Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #hasil {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
        }
        .error {
            color: red;
            background-color: #ffe6e6;
            border: 1px solid red;
        }
        .sukses {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cek Huruf Mutu</h2>
        
        <div class="form-group">
            <label for="nim">NIM (Nomor Induk Mahasiswa):</label>
            <input type="text" id="nim" placeholder="Masukkan NIM Anda">
        </div>
        
        <div class="form-group">
            <label for="nilai">Nilai Mata Kuliah:</label>
            <input type="number" id="nilai" placeholder="Masukkan Nilai (0 - 100)">
        </div>
        
        <button onclick="cekNilai()">Cek Nilai</button>

        <div id="hasil"></div>
    </div>


    <script>
        function cekNilai() {
            let nim = document.getElementById("nim").value;
            let nilaiInput = document.getElementById("nilai").value;
            let divHasil = document.getElementById("hasil");


            if (nim === "" || nilaiInput === "") {
                divHasil.innerHTML = "Harap masukkan NIM dan Nilai terlebih dahulu!";
                divHasil.className = "error";
                return; 
            }


            let nilai = Number(nilaiInput);
            let hurufMutu = "";


            if (nilai < 0 || nilai > 100) {
                divHasil.innerHTML = "Nilai tidak valid!";
                divHasil.className = "error";
                return; 
            } else if (nilai >= 80 && nilai <= 100) {
                hurufMutu = "A";
            } else if (nilai >= 70 && nilai <= 79) {
                hurufMutu = "B";
            } else if (nilai >= 60 && nilai <= 69) {
                hurufMutu = "C";
            } else if (nilai >= 50 && nilai <= 59) {
                hurufMutu = "D";
            } else if (nilai >= 0 && nilai <= 49) {
                hurufMutu = "E";
            }


            divHasil.innerHTML = "NIM: " + nim + "<br>Huruf Mutu: <strong>" + hurufMutu + "</strong>";
            divHasil.className = "sukses";
        }
    </script>

</body>
</html>
